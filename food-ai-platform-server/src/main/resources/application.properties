spring.application.name=food-ai-platform-server
server.servlet.context-path=/api/v1
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/food_ai_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:food_ai_platform}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:food_ai_platform}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${APP_JWT_SECRET:food-ai-platform-jwt-secret-key-for-local-development-2026}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost:5173}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.with-momo.com}
app.recipe.recommendation.provider=${APP_RECIPE_RECOMMENDATION_PROVIDER:auto}
app.gemini.api-key=${APP_GEMINI_API_KEY:}
app.gemini.model=${APP_GEMINI_MODEL:gemini-3.1-flash-lite}
app.gemini.fallback-model=${APP_GEMINI_FALLBACK_MODEL:gemini-2.5-flash-lite}
app.gemini.api-url=${APP_GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
springdoc.swagger-ui.path=/swagger-ui.html
